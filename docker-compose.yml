version: '3.8'

services:
  api:
    build: .
    container_name: vector_gallery_api
    ports:
      - "8000:8000"
    volumes:
      # Mount a single storage directory for data, seed images, and vector DBs
      - ./storage:/app/storage
    environment:
      # Load environment variables from .env file
      - PROJECT_NAME=${PROJECT_NAME:-VectorGallery API}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-clip-ViT-B-32}
      - VECTOR_DIMENSION=${VECTOR_DIMENSION:-512}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATA_PATH=${DATA_PATH:-./data.jsonl}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
